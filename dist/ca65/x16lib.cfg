# ld65 configuration for an X16 PRG that embeds the x16lib blob.
#
# The output is one self-contained PRG: a 2-byte load address, the
# program at $0801, zero fill up to $5800, then the library binary.
# The fill makes the file ~38 KB; it loads in one LOAD/RUN and needs
# no second file on the SD card. If you prefer a small PRG, drop the
# X16LIB area and LOAD "X16LIB.PRG" (built by dist.ps1) at run time.

# LIB's start must equal X16LIB_ORG in the generated x16lib.inc, and
# MAIN must end exactly where LIB begins. Both moved from $6000 to
# $5800 in 0.4.0: the blob is 17,547 bytes with gfx2 and no longer fits
# under $9EFF from $6000. Your program keeps $0801-$57FF.
MEMORY {
    HDR:  start = $07FF, size = $0002,              file = %O;
    MAIN: start = $0801, size = $4FFF, fill = yes,  file = %O;
    LIB:  start = $5800, size = $4700,              file = %O;
}

SEGMENTS {
    LOADADDR: load = HDR,  type = ro;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro,  optional = yes;
    DATA:     load = MAIN, type = rw,  optional = yes;
    BSS:      load = MAIN, type = bss, optional = yes;
    X16LIB:   load = LIB,  type = ro;
}
